              schema:
                $ref: '#/components/schemas/RecommendationResponse'

  /v1/resolve/{selectionId}:
    get:
      summary: Resolve a selection ID (family or skill) to a concrete skill manifest
      parameters:
        - name: selectionId
          in: path
          required: true
