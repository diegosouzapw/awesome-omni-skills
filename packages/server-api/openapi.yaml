  /v1/install/plan:
    post:
      summary: Build an install plan for selected skills, bundles, targets, or custom paths
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallPlanRequest'
      responses:
        "200":
          description: Install plan
          content:
