name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate skills
        run: python3 tools/scripts/validate_skills.py

      - name: Generate index
        run: python3 tools/scripts/generate_index.py

      - name: Build catalog
        run: node tools/scripts/build_catalog.js
