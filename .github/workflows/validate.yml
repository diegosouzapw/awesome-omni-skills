name: Validate Skills

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify project identity contract
        run: npm run identity:check

      - name: Validate contribution scope
        if: github.event_name == 'pull_request'
        run: |
          python3 tools/scripts/validate_contribution_scope.py \
            --repository "${GITHUB_REPOSITORY}" \
            --event-path "${GITHUB_EVENT_PATH}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Build generated artifacts
        run: npm run build

      - name: Install python test dependencies
        run: pip install pexpect

      - name: Run tests
        run: npm test

      - name: Resolve generated artifact diff scope
        id: generated_scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]] \
            && [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]] \
            && [[ "${{ github.event.pull_request.head.ref }}" == skills-omni/pr-* ]] \
            && [[ "${{ github.event.pull_request.title }}" == enhance:\ promote\ curated\ skills_omni\ candidates\ for\ #* ]] \
            && [[ "${{ github.event.pull_request.body }}" == *"This PR was generated automatically from source PR #"* ]]; then
            echo "paths=metadata.json skills_index.json dist skills_omni" >> "$GITHUB_OUTPUT"
          else
            echo "paths=README.md CONTRIBUTING.md REPOSITORY-SOURCES.md data/project_status.json metadata.json skills skills_index.json dist docs" >> "$GITHUB_OUTPUT"
          fi

      - name: Check generated artifacts are committed
        run: git diff --exit-code -- ${{ steps.generated_scope.outputs.paths }}
